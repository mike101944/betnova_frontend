<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="32" height="32" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="skyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#082f49"/>
        <stop offset="100%" stop-color="#0c4a6e"/>
      </linearGradient>
      <linearGradient id="nGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#FFEA83"/>
        <stop offset="50%" stop-color="#FFDD35"/>
        <stop offset="100%" stop-color="#FFA800"/>
      </linearGradient>
    </defs>
    
    <!-- Circle background -->
    <circle cx="100" cy="100" r="96" fill="url(#skyGradient)" stroke="#0f172a" stroke-width="2"/>
    
    <!-- BN Text: B white, N gradient yellow -->
    <text x="100" y="120" font-family="Arial, Helvetica, sans-serif" font-size="80" font-weight="bold" text-anchor="middle" dominant-baseline="middle" letter-spacing="2">
      <tspan fill="white">B</tspan><tspan fill="url(#nGradient)">N</tspan>
    </text>
  </svg>