<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="32" height="32" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001a3d"/>
      <stop offset="100%" stop-color="#0057a8"/>
    </linearGradient>

    <!-- Gold Gradient -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe600"/>
      <stop offset="50%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ff9900"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Circle Background -->
  <circle
    cx="100"
    cy="100"
    r="96"
    fill="url(#bgGradient)"
    stroke="#00112b"
    stroke-width="3"
  />

  <!-- VB Text -->
  <g filter="url(#shadow)">
    <!-- V -->
    <text
      x="68"
      y="122"
      font-family="Arial, Helvetica, sans-serif"
      font-size="82"
      font-weight="900"
      fill="#ffffff"
      text-anchor="middle"
    >
      V
    </text>

    <!-- B -->
    <text
      x="128"
      y="122"
      font-family="Arial, Helvetica, sans-serif"
      font-size="82"
      font-weight="900"
      fill="url(#goldGradient)"
      text-anchor="middle"
    >
      B
    </text>
  </g>
</svg>